name: CI
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web
        run: |
          cd web
          npm ci
          npm run build

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests
        run: go test ./...

      - name: Build
        run: go build -o mobilecoding ./cmd/server

      - name: Smoke test
        run: |
          MOBILECODING_AUTH_TOKEN=test-ci ./mobilecoding &
          SERVER_PID=$!
          sleep 2
          curl -ks https://127.0.0.1:8443/healthz | grep -q ok
          kill $SERVER_PID 2>/dev/null || true
