name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web
        run: |
          cd web
          npm ci
          npm run build

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build matrix
        run: |
          mkdir -p dist
          declare -a pairs=("linux/amd64" "linux/arm64" "darwin/amd64" "darwin/arm64" "windows/amd64")
          for pair in "${pairs[@]}"; do
            os="${pair%/*}"
            arch="${pair#*/}"
            ext=""
            [ "$os" = "windows" ] && ext=".exe"
            out="dist/mobilecoding-${os}-${arch}${ext}"
            echo "Building $out"
            GOOS=$os GOARCH=$arch go build -o "$out" ./cmd/server
            chmod +x "$out"
          done
          ls -la dist/

      - name: Create checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: false